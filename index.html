<!DOCTYPE html>
<html>
<body>

<h2>Email Tool</h2>

<h3>Upload Leads</h3>
<input type="file" id="file">
<button onclick="upload()">Upload Leads</button>

<h3>Add Inbox</h3>
<input id="email" placeholder="email">
<input id="pass" placeholder="password">
<button onclick="addInbox()">Add Inbox</button>

<h3>Template</h3>
<textarea id="template" rows="6"></textarea>

<h3>Batch Size</h3>
<input id="batch" value="10">

<br><br>

<button onclick="run()">RUN</button>
<button onclick="download()">Download Failed</button>

<script>

async function upload(){
  let f = document.getElementById("file").files[0];
  let form = new FormData();
  form.append("file", f);

  await fetch("/upload-leads", {
    method:"POST",
    body: form
  });

  alert("Uploaded");
}

async function addInbox(){
  await fetch("/add-inbox", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("pass").value
    })
  });

  alert("Inbox added");
}

async function run(){
  await fetch("/run", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      template: document.getElementById("template").value,
      batch: Number(document.getElementById("batch").value)
    })
  });

  alert("Running...");
}

function download(){
  window.open("/download-failed");
}

</script>

</body>
</html>
