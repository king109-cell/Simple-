<!DOCTYPE html>
<html>
<head>
  <title>Cold Email Tool Pro</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    ul {
      padding-left: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row button {
      width: auto;
    }

    #app {
      display: none;
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Login</h2>

  <input type="password" id="loginPassword" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<div id="app">

  <div class="box">
    <h2>Leads</h2>

    <input type="file" id="csvFile">

    <div class="row">
      <button onclick="uploadCSV()">Upload CSV</button>
      <button onclick="clearLeads()">Clear Leads</button>
    </div>

    <ul id="leadList"></ul>
  </div>

  <div class="box">
    <h2>Inboxes</h2>

    <input type="email" id="inboxEmail" placeholder="Gmail">

    <input type="password" id="inboxPassword" placeholder="App Password">

    <div class="row">
      <button onclick="addInbox()">Add Inbox</button>
      <button onclick="clearInboxes()">Clear All</button>
    </div>

    <ul id="inboxList"></ul>
  </div>

  <div class="box">
    <h2>Email Composer</h2>

    <input type="text" id="subject" placeholder="Subject">

    <textarea id="template" style="height:200px;" placeholder="Use {{name}} and {{icebreaker}}"></textarea>

    <div class="row">
      <button onclick="saveTemplate()">Save Template</button>
      <button onclick="clearTemplate()">Clear Template</button>
    </div>
  </div>

  <div class="box">
    <h2>Control</h2>

    <input type="number" id="batch" value="10" placeholder="Batch Size">

    <div class="row">
      <button onclick="runSender()">RUN</button>
      <button onclick="stopSender()">STOP</button>
    </div>

    <h3 id="progress">0/0</h3>
  </div>

</div>

<script>

async function login() {
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password })
  });

  if (res.ok) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    loadTemplate();

    refreshStatus();
  } else {
    alert("Wrong password");
  }
}

async function uploadCSV() {
  const file = document.getElementById("csvFile").files[0];

  const formData = new FormData();

  formData.append("file", file);

  const res = await fetch("/upload-leads", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  alert(`Uploaded ${data.total} leads`);

  refreshStatus();
}

async function clearLeads() {
  await fetch("/clear-leads", {
    method: "POST"
  });

  refreshStatus();
}

async function addInbox() {
  const email = document.getElementById("inboxEmail").value;
  const password = document.getElementById("inboxPassword").value;

  const res = await fetch("/add-inbox", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  alert(data.message);

  refreshStatus();
}

async function clearInboxes() {
  await fetch("/clear-inboxes", {
    method: "POST"
  });

  refreshStatus();
}

function saveTemplate() {
  localStorage.setItem(
    "email_template",
    document.getElementById("template").value
  );

  localStorage.setItem(
    "email_subject",
    document.getElementById("subject").value
  );

  alert("Saved");
}

function loadTemplate() {
  document.getElementById("template").value =
    localStorage.getItem("email_template") || "";

  document.getElementById("subject").value =
    localStorage.getItem("email_subject") || "";
}

function clearTemplate() {
  document.getElementById("template").value = "";
}

async function runSender() {
  const subject = document.getElementById("subject").value;
  const template = document.getElementById("template").value;
  const batch = document.getElementById("batch").value;

  await fetch("/run", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      subject,
      template,
      batch
    })
  });

  refreshStatus();
}

async function stopSender() {
  await fetch("/stop", {
    method: "POST"
  });

  refreshStatus();
}

async function removeLead(index) {
  await fetch("/remove-lead", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ index })
  });

  refreshStatus();
}

async function removeInbox(index) {
  await fetch("/remove-inbox", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ index })
  });

  refreshStatus();
}

async function refreshStatus() {
  const res = await fetch("/status");

  const data = await res.json();

  document.getElementById("progress").innerText =
    `${data.sentCount}/${data.total}`;

  const inboxList = document.getElementById("inboxList");

  inboxList.innerHTML = "";

  data.inboxes.forEach((inbox, index) => {
    const li = document.createElement("li");

    li.innerHTML =
      `${inbox.email} (${inbox.sentToday}) 
      <button onclick="removeInbox(${index})">X</button>`;

    inboxList.appendChild(li);
  });

  const leadList = document.getElementById("leadList");

  leadList.innerHTML = "";

  data.leads.slice(0, 10).forEach((lead, index) => {
    const li = document.createElement("li");

    li.innerHTML =
      `${lead.name} - ${lead.email}
      <button onclick="removeLead(${index})">X</button>`;

    leadList.appendChild(li);
  });
}

setInterval(refreshStatus, 3000);

</script>

</body>
</html>
