<!DOCTYPE html>
<html>
<head>
  <title>Cold Email Tool Pro</title>

  <style>
    body{
      font-family: Arial;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card{
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    input, textarea, button{
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button{
      cursor: pointer;
    }

    ul{
      list-style: none;
      padding: 0;
    }

    li{
      background: #eee;
      padding: 10px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .hidden{
      display: none;
    }

    .row{
      display: flex;
      gap: 10px;
    }

    .row > *{
      flex: 1;
    }

    #status{
      font-size: 20px;
      font-weight: bold;
    }

    .success{
      color: green;
    }

    .error{
      color: red;
    }
  </style>
</head>

<body>

<div class="card" id="loginSection">
  <h2>Login</h2>

  <input type="password" id="loginPassword" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<div id="app" class="hidden">

  <div class="card">
    <h2>Leads</h2>

    <input type="file" id="csvFile">

    <div class="row">
      <button onclick="uploadCSV()">Upload CSV</button>
      <button onclick="clearLeads()">Clear Leads</button>
    </div>

    <ul id="leadList"></ul>
  </div>

  <div class="card">
    <h2>Inbox Management</h2>

    <input type="email" id="inboxEmail" placeholder="Gmail">

    <input type="password" id="inboxPassword" placeholder="App Password">

    <div class="row">
      <button onclick="addInbox()">Add Inbox</button>
      <button onclick="clearInboxes()">Clear All</button>
    </div>

    <p id="inboxMsg"></p>

    <ul id="inboxList"></ul>
  </div>

  <div class="card">
    <h2>Email Composer</h2>

    <input type="text" id="subject" placeholder="Subject">

    <textarea
      id="template"
      placeholder="Use {{name}} and {{icebreaker}}"
      style="height:200px"
    ></textarea>

    <button onclick="clearTemplate()">Clear Template</button>
  </div>

  <div class="card">
    <h2>Controls</h2>

    <input type="number" id="batch" value="10">

    <div class="row">
      <button onclick="runEmails()">RUN</button>
      <button onclick="stopEmails()">STOP</button>
    </div>

    <p id="status">0/0</p>
  </div>

</div>

<script>

async function login(){
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({password})
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    loadTemplate();
    refreshStatus();
    setInterval(refreshStatus,3000);
  }else{
    document.getElementById("loginMsg").innerHTML =
      `<span class="error">${data.message}</span>`;
  }
}

async function uploadCSV(){
  const file = document.getElementById("csvFile").files[0];

  if(!file){
    alert("Select CSV");
    return;
  }

  const formData = new FormData();
  formData.append("file",file);

  const res = await fetch("/upload-leads",{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  alert(`Uploaded ${data.count} leads`);

  refreshStatus();
}

async function clearLeads(){
  await fetch("/clear-leads",{
    method:"POST"
  });

  refreshStatus();
}

async function addInbox(){
  const email = document.getElementById("inboxEmail").value;
  const password = document.getElementById("inboxPassword").value;

  const res = await fetch("/add-inbox",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("inboxMsg").innerHTML =
      `<span class="success">${data.message}</span>`;
  }else{
    document.getElementById("inboxMsg").innerHTML =
      `<span class="error">${data.message}</span>`;
  }

  refreshStatus();
}

async function clearInboxes(){
  await fetch("/clear-inboxes",{
    method:"POST"
  });

  refreshStatus();
}

async function removeInbox(index){
  await fetch("/remove-inbox",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({index})
  });

  refreshStatus();
}

async function removeLead(index){
  await fetch("/remove-lead",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({index})
  });

  refreshStatus();
}

function saveTemplate(){
  localStorage.setItem(
    "emailTemplate",
    document.getElementById("template").value
  );

  localStorage.setItem(
    "emailSubject",
    document.getElementById("subject").value
  );
}

function loadTemplate(){
  document.getElementById("template").value =
    localStorage.getItem("emailTemplate") || "";

  document.getElementById("subject").value =
    localStorage.getItem("emailSubject") || "";
}

function clearTemplate(){
  document.getElementById("template").value = "";
  document.getElementById("subject").value = "";

  saveTemplate();
}

document.getElementById("template")
  .addEventListener("input",saveTemplate);

document.getElementById("subject")
  .addEventListener("input",saveTemplate);

async function runEmails(){

  saveTemplate();

  const subject =
    document.getElementById("subject").value;

  const template =
    document.getElementById("template").value;

  const batch =
    document.getElementById("batch").value;

  const res = await fetch("/run",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      subject,
      template,
      batch
    })
  });

  const data = await res.json();

  alert(data.message);
}

async function stopEmails(){
  await fetch("/stop",{
    method:"POST"
  });

  alert("Stopped");
}

async function refreshStatus(){

  const res = await fetch("/status");

  const data = await res.json();

  document.getElementById("status").innerText =
    `${data.sent}/${data.total}`;

  const inboxList =
    document.getElementById("inboxList");

  inboxList.innerHTML = "";

  data.inboxes.forEach((inbox,index)=>{

    const li = document.createElement("li");

    li.innerHTML = `
      ${inbox.email} (${inbox.sentToday}/30)
      <button onclick="removeInbox(${index})">X</button>
    `;

    inboxList.appendChild(li);
  });

  const leadList =
    document.getElementById("leadList");

  leadList.innerHTML = "";

  data.leads.forEach((lead,index)=>{

    const li = document.createElement("li");

    li.innerHTML = `
      ${lead.name} - ${lead.email}
      <button onclick="removeLead(${index})">X</button>
    `;

    leadList.appendChild(li);
  });
}

</script>

</body>
</html>
