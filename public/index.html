<!DOCTYPE html>
<html>
<body style="font-family: Arial; padding: 20px;">

<div id="loginBox">
  <h2>Enter Password</h2>
  <input type="password" id="loginPass">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<h2>Cold Email Tool</h2>

<h3>Upload Leads</h3>
<input type="file" id="file">
<button onclick="upload()">Upload</button>
<button onclick="clearLeads()">Clear Leads</button>

<h3>Add Inbox</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="App Password"><br><br>
<button onclick="addInbox()">Add Inbox</button>

<ul id="inboxList"></ul>

<h3>Subject</h3>
<input id="subject" style="width:100%;">

<h3>Template</h3>
<textarea id="template" style="width:100%; height:200px;"></textarea>

<h3>Batch</h3>
<input id="batch" value="10">

<br><br>
<button onclick="run()">RUN</button>
<button onclick="stop()">STOP</button>

<h3>Status:</h3>
<div id="status">Idle</div>

<h3>Progress:</h3>
<div id="progress">0 / 0</div>

<h3>Failed Emails:</h3>
<ul id="failedList"></ul>

<button onclick="download()">Download Failed</button>

</div>

<script>

let isRunning = false;
let loggedIn = false;

async function login(){
  let pass = loginPass.value;

  let res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:pass})
  });

  let data = await res.json();

  if(data.success){
    loginBox.style.display="none";
    app.style.display="block";
    loggedIn = true;
  } else {
    alert("Wrong password ❌");
  }
}

async function upload(){
  if(!loggedIn) return;
  let form = new FormData();
  form.append("file", file.files[0]);
  await fetch("/upload-leads",{method:"POST",body:form});
}

async function clearLeads(){
  await fetch("/clear-leads",{method:"POST"});
  alert("Leads cleared ✅");
}

async function addInbox(){
  let res = await fetch("/add-inbox",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: pass.value
    })
  });

  let data = await res.json();

  if(data.success){
    let li=document.createElement("li");
    li.innerText=email.value;
    inboxList.appendChild(li);
  } else {
    alert("Failed ❌: " + data.error);
  }
}

async function run(){
  if(isRunning) return alert("Already running");

  isRunning=true;

  await fetch("/run",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      subject:subject.value,
      template:template.value,
      batch:Number(batch.value)
    })
  });

  isRunning=false;
}

async function stop(){
  await fetch("/stop",{method:"POST"});
}

function download(){
  window.open("/download-failed");
}

setInterval(async ()=>{
  if(!loggedIn) return;

  let res=await fetch("/status");
  let data=await res.json();

  status.innerText = data.running ? "Running" : "Stopped";
  progress.innerText = data.sent + " / " + data.total;

  failedList.innerHTML="";
  data.failed.forEach(f=>{
    let li=document.createElement("li");
    li.innerText=f.email;
    failedList.appendChild(li);
  });

},3000);

</script>

</body>
</html>
