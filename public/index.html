<!DOCTYPE html>
<html>
<head>
  <title>Cold Email Tool</title>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>Cold Email Tool</h2>

  <hr>

  <h3>Upload Leads CSV</h3>
  <input type="file" id="file">
  <button onclick="upload()">Upload Leads</button>

  <hr>

  <h3>Add Inbox</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" placeholder="App Password"><br><br>
  <button onclick="addInbox()">Add Inbox</button>

  <h4>Inbox List:</h4>
  <ul id="inboxList"></ul>

  <hr>

  <h3>Email Subject</h3>
  <input id="subject" placeholder="Enter subject">

  <hr>

  <h3>Email Template</h3>
  <textarea id="template" rows="6" cols="50">
Hi {{name}},

{{icebreaker}}

Quick question for you.
  </textarea>

  <hr>

  <h3>Run Campaign</h3>
  Batch size:
  <input id="batch" value="10"><br><br>

  <button onclick="run()">RUN</button>

  <hr>

  <button onclick="download()">Download Failed Emails</button>

<script>

let inboxes = [];
let isRunning = false;

async function upload() {
  let file = document.getElementById("file").files[0];
  let form = new FormData();
  form.append("file", file);

  await fetch("/upload-leads", {
    method: "POST",
    body: form
  });

  alert("Leads uploaded");
}

async function addInbox(){

  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let res = await fetch("/add-inbox", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email, password: pass })
  });

  let text = await res.text();

  if(text === "OK"){
    inboxes.push(email);

    let li = document.createElement("li");
    li.innerText = email;
    document.getElementById("inboxList").appendChild(li);

    alert("Inbox added ✅");
  } else {
    alert("Inbox failed ❌");
  }
}

async function run(){

  if(isRunning){
    alert("Already running ⚠️");
    return;
  }

  isRunning = true;
  alert("Campaign started 🚀");

  await fetch("/run", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      subject: document.getElementById("subject").value,
      template: document.getElementById("template").value,
      batch: Number(document.getElementById("batch").value)
    })
  });

  alert("Campaign finished ✅");
  isRunning = false;
}

function download(){
  window.open("/download-failed");
}

</script>

</body>
</html>
