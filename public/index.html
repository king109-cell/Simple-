<!DOCTYPE html>
<html>
<body style="font-family: Arial; padding:20px;">

<div id="loginBox">
  <input type="password" id="loginPass">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<h3>Upload Leads</h3>
<input type="file" id="file">
<button onclick="upload()">Upload</button>
<button onclick="clearLeads()">Clear Leads</button>

<h3>Leads</h3>
<ul id="leadList"></ul>

<h3>Inbox</h3>
<input id="email"><br>
<input id="pass"><br>
<button onclick="addInbox()">Add</button>
<button onclick="clearInboxes()">Clear All</button>

<ul id="inboxList"></ul>

<h3>Subject</h3>
<input id="subject" style="width:100%;">

<h3>Template</h3>
<textarea id="template" style="width:100%;height:200px;"></textarea>
<button onclick="clearTemplate()">Clear Template</button>

<h3>Batch</h3>
<input id="batch" value="10">

<br><br>
<button onclick="run()">RUN</button>
<button onclick="stop()">STOP</button>

<div id="progress"></div>

</div>

<script>

let loggedIn=false;

async function login(){
  let r=await fetch("/login",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:loginPass.value})
  });
  let d=await r.json();
  if(d.success){
    loginBox.style.display="none";
    app.style.display="block";
    loggedIn=true;
    template.value=localStorage.getItem("t")||"";
  }
}

template.oninput=()=>localStorage.setItem("t",template.value);

function clearTemplate(){
  template.value="";
  localStorage.removeItem("t");
}

async function upload(){
  let f=new FormData();
  f.append("file",file.files[0]);
  await fetch("/upload-leads",{method:"POST",body:f});
}

async function clearLeads(){
  await fetch("/clear-leads",{method:"POST"});
}

async function removeLead(i){
  await fetch("/remove-lead",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({index:i})
  });
}

async function addInbox(){
  await fetch("/add-inbox",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:pass.value})
  });
}

async function removeInbox(i){
  await fetch("/remove-inbox",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({index:i})
  });
}

async function clearInboxes(){
  await fetch("/clear-inboxes",{method:"POST"});
}

async function run(){
  await fetch("/run",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      subject:subject.value,
      template:template.value,
      batch:Number(batch.value)
    })
  });
}

async function stop(){
  await fetch("/stop",{method:"POST"});
}

setInterval(async ()=>{
  if(!loggedIn) return;

  let r=await fetch("/status");
  let d=await r.json();

  progress.innerText=d.sent+"/"+d.total;

  inboxList.innerHTML="";
  d.inboxes.forEach((i,idx)=>{
    let li=document.createElement("li");
    li.innerHTML=i.email+" ("+i.sentToday+") <button onclick='removeInbox("+idx+")'>X</button>";
    inboxList.appendChild(li);
  });

  leadList.innerHTML="";
  d.leads.slice(0,10).forEach((l,idx)=>{
    let li=document.createElement("li");
    li.innerHTML=l.email+" <button onclick='removeLead("+idx+")'>X</button>";
    leadList.appendChild(li);
  });

},3000);

</script>

</body>
</html>
