<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Email Automation Tool</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { max-width: 800px; margin: 20px auto; padding: 0 20px; }
    .hidden { display: none !important; }
    section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 6px; }
    h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    input, textarea, button { margin: 5px; padding: 8px; font-size: 0.95rem; }
    button { cursor: pointer; }
    .row { display: flex; align-items: center; flex-wrap: wrap; }
    .full-width { width: 100%; }
    ul { list-style: none; padding: 0; }
    li { padding: 5px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .error { color: red; }
    .success { color: green; }
    .inbox-row, .lead-row { display: flex; gap: 10px; align-items: center; }
    .progress { font-size: 1.1rem; }
  </style>
</head>
<body>
  <!-- Login -->
  <section id="login-section">
    <h2>Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button id="login-btn">Login</button>
    <div id="login-error" class="error"></div>
  </section>

  <!-- App -->
  <div id="app" class="hidden">
    <h1>Cold Email Automation Tool</h1>

    <section>
      <h2>Inbox Management</h2>
      <div class="inbox-row">
        <input type="email" id="inbox-email" placeholder="Gmail address">
        <input type="password" id="inbox-app-password" placeholder="App Password">
        <button id="add-inbox-btn">Add</button>
      </div>
      <button id="clear-inboxes-btn">Clear All Inboxes</button>
      <ul id="inbox-list"></ul>
    </section>

    <section>
      <h2>Leads</h2>
      <input type="file" id="csv-file" accept=".csv">
      <button id="upload-csv-btn">Upload CSV</button>
      <button id="clear-leads-btn">Clear All Leads</button>
      <ul id="lead-list"></ul>
    </section>

    <section>
      <h2>Email Composer</h2>
      <input type="text" id="subject" placeholder="Subject" class="full-width">
      <textarea id="template" class="full-width" rows="5" placeholder="Write your email... Use {{name}} and {{icebreaker}}"></textarea>
      <button id="clear-template-btn">Clear Template</button>
    </section>

    <section>
      <h2>Batch & Control</h2>
      <div class="row">
        <label>Batch size: <input type="number" id="batch-size" value="10" min="1" style="width:80px"></label>
        <button id="run-btn">▶ RUN</button>
        <button id="stop-btn" disabled>⏹ STOP</button>
      </div>
      <div class="progress" id="progress">0 / 0</div>
      <div id="run-status"></div>
    </section>

    <div id="global-message"></div>
  </div>

  <script>
    let loggedIn = false;
    let statusInterval = null;

    function showMessage(msg, isError = false) {
      const el = document.getElementById('global-message');
      el.textContent = msg;
      el.className = isError ? 'error' : 'success';
      setTimeout(() => el.textContent = '', 4000);
    }

    async function api(url, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      try {
        await api('/login', 'POST', { password });
        loggedIn = true;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        loadSavedTemplate();
        startStatusPolling();
      } catch (err) {
        document.getElementById('login-error').textContent = err.message;
      }
    });

    function saveTemplateToStorage(subject, template) {
      localStorage.setItem('email_subject', subject);
      localStorage.setItem('email_template', template);
    }
    function loadSavedTemplate() {
      const subj = localStorage.getItem('email_subject') || '';
      const templ = localStorage.getItem('email_template') || '';
      document.getElementById('subject').value = subj;
      document.getElementById('template').value = templ;
    }

    document.getElementById('subject').addEventListener('input', () => {
      saveTemplateToStorage(document.getElementById('subject').value, document.getElementById('template').value);
    });
    document.getElementById('template').addEventListener('input', () => {
      saveTemplateToStorage(document.getElementById('subject').value, document.getElementById('template').value);
    });
    document.getElementById('clear-template-btn').addEventListener('click', () => {
      document.getElementById('subject').value = '';
      document.getElementById('template').value = '';
      saveTemplateToStorage('', '');
    });

    document.getElementById('add-inbox-btn').addEventListener('click', async () => {
      const email = document.getElementById('inbox-email').value.trim();
      const password = document.getElementById('inbox-app-password').value.trim();
      if (!email || !password) return showMessage('Fill both fields', true);
      try {
        const res = await api('/add-inbox', 'POST', { email, password });
        showMessage(res.message || 'Inbox added');
        document.getElementById('inbox-email').value = '';
        document.getElementById('inbox-app-password').value = '';
        refreshStatus();
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('clear-inboxes-btn').addEventListener('click', async () => {
      if (!confirm('Clear ALL inboxes?')) return;
      try {
        await api('/clear-inboxes', 'POST');
        showMessage('All inboxes cleared');
        refreshStatus();
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('upload-csv-btn').addEventListener('click', async () => {
      const fileInput = document.getElementById('csv-file');
      if (!fileInput.files.length) return showMessage('Select a CSV file', true);
      const formData = new FormData();
      formData.append('csvfile', fileInput.files[0]);
      try {
        const res = await fetch('/upload-leads', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        showMessage(`Added ${data.added} leads. Total: ${data.total}`);
        fileInput.value = '';
        refreshStatus();
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('clear-leads-btn').addEventListener('click', async () => {
      if (!confirm('Clear ALL leads?')) return;
      try {
        await api('/clear-leads', 'POST');
        showMessage('All leads cleared');
        refreshStatus();
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('run-btn').addEventListener('click', async () => {
      const subject = document.getElementById('subject').value.trim();
      const template = document.getElementById('template').value.trim();
      const batchCount = parseInt(document.getElementById('batch-size').value) || 10;
      if (!subject || !template) return showMessage('Subject and template required', true);
      try {
        await api('/run', 'POST', { subject, template, batchCount });
        showMessage('Sending started');
        document.getElementById('run-btn').disabled = true;
        document.getElementById('stop-btn').disabled = false;
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('stop-btn').addEventListener('click', async () => {
      try {
        await api('/stop', 'POST');
        showMessage('Sending stopped');
        document.getElementById('run-btn').disabled = false;
        document.getElementById('stop-btn').disabled = true;
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    async function refreshStatus() {
      if (!loggedIn) return;
      try {
        const status = await api('/status');
        updateUI(status);
      } catch (err) {
        console.error(err);
      }
    }

    function updateUI(status) {
      document.getElementById('progress').textContent = `${status.sentCount} / ${status.totalLeads}`;
      if (status.running) {
        document.getElementById('run-btn').disabled = true;
        document.getElementById('stop-btn').disabled = false;
      } else {
        document.getElementById('run-btn').disabled = false;
        document.getElementById('stop-btn').disabled = true;
      }
      document.getElementById('run-status').textContent = status.running ? '⏳ Sending in progress...' : '';

      const inboxUl = document.getElementById('inbox-list');
      inboxUl.innerHTML = '';
      status.inboxes.forEach(ib => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${ib.email} (sent today: ${ib.sentToday})</span>
                        <button data-index="${ib.index}" class="remove-inbox-btn">✕</button>`;
        inboxUl.appendChild(li);
      });
      document.querySelectorAll('.remove-inbox-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const index = parseInt(e.target.dataset.index);
          try {
            await api('/remove-inbox', 'POST', { index });
            showMessage('Inbox removed');
            refreshStatus();
          } catch (err) {
            showMessage(err.message, true);
          }
        });
      });

      const leadUl = document.getElementById('lead-list');
      leadUl.innerHTML = '';
      status.leads.forEach(lead => {
        const li = document.createElement('li');
        const icon = lead.sent ? '✅' : '⬜';
        li.innerHTML = `<span>${icon} ${lead.name} &lt;${lead.email}&gt; ${lead.icebreaker ? '• ' + lead.icebreaker : ''}</span>
                        <button data-index="${lead.index}" class="remove-lead-btn">✕</button>`;
        leadUl.appendChild(li);
      });
      document.querySelectorAll('.remove-lead-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const index = parseInt(e.target.dataset.index);
          try {
            await api('/remove-lead', 'POST', { index });
            showMessage('Lead removed');
            refreshStatus();
          } catch (err) {
            showMessage(err.message, true);
          }
        });
      });
    }

    function startStatusPolling() {
      if (statusInterval) clearInterval(statusInterval);
      refreshStatus();
      statusInterval = setInterval(refreshStatus, 3000);
    }
  </script>
</body>
</html>
